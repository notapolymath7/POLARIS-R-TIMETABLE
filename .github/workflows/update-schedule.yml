name: Update POLARIS R Schedule

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          pip install playwright pypdf
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run timetable bot
        run: python bot.py --output ./pdfs
        continue-on-error: true

      - name: Check if schedule changed
        id: check_change
        run: |
          git diff --quiet schedule_data.js && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated schedule_data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule_data.js || true
          git diff --cached --quiet || git commit -m "chore: auto-update schedule $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true

      - name: Send Telegram notification
        if: steps.check_change.outputs.changed == 'true'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="🚀 <b>POLARIS R Schedule Updated!</b>%0A%0ANew timetable PDF detected and parsed.%0A%0A📅 View your updated schedule:%0Ahttps://notapolymath7.github.io/POLARIS-R-TIMETABLE/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: fetch-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
